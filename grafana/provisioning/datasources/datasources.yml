apiVersion: 1

datasources:

  # ── Prometheus ───────────────────────────────────────────────────────────────
  - name: Prometheus
    type: prometheus
    uid: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    jsonData:
      httpMethod: POST
      # Metric → Trace: exemplars on metric data points link to Tempo traces
      exemplarTraceIdDestinations:
        - name: trace_id
          datasourceUid: tempo
          urlDisplayLabel: "View Trace in Tempo"

  # ── Tempo (distributed traces) ───────────────────────────────────────────────
  - name: Tempo
    type: tempo
    uid: tempo
    access: proxy
    url: http://tempo:3200
    jsonData:
      httpMethod: GET

      # Trace → Logs: from a span, jump to correlated Loki logs
      tracesToLogsV2:
        datasourceUid: loki
        spanStartTimeShift: "-1m"
        spanEndTimeShift: "1m"
        filterByTraceID: true
        filterBySpanID: false
        customQuery: true
        query: '{service_name="${__span.tags["service.name"]}"} |= `${__span.traceId}`'

      # Trace → Metrics: from a span, jump to RED metrics for that service
      tracesToMetrics:
        datasourceUid: prometheus
        spanStartTimeShift: "-2m"
        spanEndTimeShift: "2m"
        queries:
          - name: "Request Rate"
            query: 'rate(traces_spanmetrics_calls_total{service="${__span.tags["service.name"]}"}[$__rate_interval])'
          - name: "Error Rate"
            query: 'rate(traces_spanmetrics_calls_total{service="${__span.tags["service.name"]}", status_code="STATUS_CODE_ERROR"}[$__rate_interval])'

      # Service map — auto-generated by Tempo metrics_generator
      serviceMap:
        datasourceUid: prometheus

      # Node graph for visualising service dependencies
      nodeGraph:
        enabled: true

      # Enable TraceQL search in Explore
      search:
        hide: false

      lokiSearch:
        datasourceUid: loki

  # ── Loki (logs) ──────────────────────────────────────────────────────────────
  - name: Loki
    type: loki
    uid: loki
    access: proxy
    url: http://loki:3100
    jsonData:
      # Log → Trace: click a trace_id value in a log line, jump to Tempo
      derivedFields:
        - datasourceUid: tempo
          matcherRegex: '"trace_id"\s*:\s*"([a-f0-9]+)"'
          name: TraceID
          url: "${__value.raw}"
          urlDisplayLabel: "View Trace in Tempo"
